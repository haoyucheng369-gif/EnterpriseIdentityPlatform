services:
  auth-server:
    build:
      context: .
      dockerfile: backend/EnterpriseIdentityPlatform.AuthServer/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      Jwt__Issuer: http://auth-server:8080
      Jwt__Audience: api-server
      Jwt__KeyId: auth-flow-lab-key-1
      Cors__AllowedOrigins__0: http://127.0.0.1:5173
      Cors__AllowedOrigins__1: http://localhost:5173
    ports:
      - "5001:8080"

  api-server:
    build:
      context: .
      dockerfile: backend/EnterpriseIdentityPlatform.ApiServer/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      Jwt__Authority: http://auth-server:8080
      Jwt__Audience: api-server
      Jwt__RequireHttpsMetadata: "false"
      Cors__AllowedOrigins__0: http://127.0.0.1:5173
      Cors__AllowedOrigins__1: http://localhost:5173
    ports:
      - "5002:8080"
    depends_on:
      - auth-server

  # BFF йЌ¦г„¦ж№‡йЌ”пј„оЃ¬ж·‡жї†з“Ё access tokenй”›е±ѕзҐ»з‘™е ќж«’йЌ™оЃ€в‚¬ж°із№ѓ HttpOnly cookie з’Ѓеќ—жЈ¶ BFFйЉ†?
  bff:
    build:
      context: .
      dockerfile: backend/EnterpriseIdentityPlatform.Bff/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      Bff__AuthServerPublicUrl: http://localhost:5001
      Bff__AuthServerBackchannelUrl: http://auth-server:8080
      Bff__ApiServerBackchannelUrl: http://api-server:8080
      Bff__CallbackUrl: http://localhost:5003/bff/callback
      Bff__FrontendUrl: http://localhost:5173
      Cors__AllowedOrigins__0: http://localhost:5173
    ports:
      - "5003:8080"
    depends_on:
      - auth-server
      - api-server

  frontend:
    build:
      context: frontend/EnterpriseIdentityPlatform.Web
    ports:
      - "5173:80"
    depends_on:
      - auth-server
      - api-server
      - bff
